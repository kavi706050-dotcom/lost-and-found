<!DOCTYPE html>
<html>

<head>
  <title>AI Verification</title>
  <style>
    body {
      background: linear-gradient(120deg, #141e30, #243b55);
      font-family: Arial;
      color: white;
    }

    .box {
      width: 420px;
      margin: 80px auto;
      background: rgba(255, 255, 255, 0.12);
      padding: 30px;
      border-radius: 12px;
    }

    input,
    textarea,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #00c896;
      color: white;
      border: none;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>🤖 AI Verification</h2>

    <p><b>Item:</b> {{ item.name }}</p>
    <p>{{ item.description }}</p>

    <form method="POST" enctype="multipart/form-data">
      <textarea name="description" placeholder="Enter verification description" required></textarea>
      <input type="file" name="image" required>
      <button>Run AI Match</button>
    </form>

    <a href="/home">⬅ Back</a>
  </div>
</body>

</html>
