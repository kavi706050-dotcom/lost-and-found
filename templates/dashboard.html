<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            background: -webkit-linear-gradient(#00f260, #0575e6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.9em;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .chart-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
        }

        .btn {
            display: block;
            width: fit-content;
            margin: 30px auto 0;
            padding: 12px 30px;
            background: linear-gradient(90deg, #00f260, #0575e6);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        canvas {
            max-width: 100%;
        }

        @media (max-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📊 Founder Analytics</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">{{ total }}</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ approved }}</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ rejected }}</div>
                <div class="stat-label">Rejected</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">{{ ai_score }}%</div>
                <div class="stat-label">AI Accuracy</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <a href="/home" class="btn">⬅ Back to Home</a>
    </div>

    <script>
        // Status Breakdown Chart
        const ctx1 = document.getElementById('statusChart').getContext('2d');
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: ['Approved', 'Rejected', 'Pending'],
                datasets: [{
                    data: [{{ approved }}, {{ rejected }}, {{ total - approved - rejected }}],
            backgroundColor: [
            'rgba(0, 242, 96, 0.7)',
            'rgba(255, 77, 77, 0.7)',
            'rgba(255, 170, 0, 0.7)'
        ],
            borderColor: [
            'rgba(0, 242, 96, 1)',
            'rgba(255, 77, 77, 1)',
            'rgba(255, 170, 0, 1)'
        ],
            borderWidth: 1
            }]
        },
            options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { color: 'white' } },
                title: { display: true, text: 'Item Status Distribution', color: 'white' }
            }
        }
    });

        // Mock Growth Chart (since we don't have time series data yet, using a dummy visual)
        const ctx2 = document.getElementById('growthChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
                datasets: [{
                    label: 'Items Recovered',
                    data: [2, 5, 3, 8, {{ approved }}], // Dynamic last value
                backgroundColor: 'rgba(5, 117, 230, 0.7)',
                borderColor: 'rgba(5, 117, 230, 1)',
                borderWidth: 1
            }]
        },
            options: {
            responsive: true,
            scales: {
                y: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                x: { ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } }
            },
            plugins: {
                legend: { labels: { color: 'white' } },
                title: { display: true, text: 'Weekly Recovery Activity', color: 'white' }
            }
        }
    });
    </script>

</body>

</html>
