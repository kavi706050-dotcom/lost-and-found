<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lost&Found AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background: #0f0c29;
            overflow: hidden;
        }

        /* Left Side - Hero Image */
        .hero-section {
            flex: 1.5;
            background: url('/static/hero.png') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 60px;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(15, 12, 41, 0.4), rgba(15, 12, 41, 0.9));
        }

        .hero-content {
            position: relative;
            z-index: 2;
            color: white;
            max-width: 600px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .hero-content p {
            font-size: 1.2rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        /* Right Side - Login Form */
        .login-section {
            flex: 1;
            background: #0f0c29;
            /* Dark theme match */
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            animation: slideIn 0.8s ease-out;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h2 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #8b8b9e;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        input[type="email"] {
            width: 100%;
            padding: 16px;
            background: #1e1e2f;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input[type="email"]:focus {
            border-color: #00f260;
            box-shadow: 0 0 10px rgba(0, 242, 96, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00f260, #0575e6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 242, 96, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 242, 96, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .hero-section {
                flex: 0.8;
                padding: 40px;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .login-section {
                flex: 1.2;
            }
        }
    </style>
</head>

<body>

    <!-- Left Side: Custom AI Generated Hero Image -->
    <div class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Nothing is Truly Lost.</h1>
            <p>Experience the next generation of recovery.
                Our AI-powered visual matching ensures your items find their way back home.</p>
        </div>
    </div>

    <!-- Right Side: Login -->
    <div class="login-section">
        <div class="login-box">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Enter your email to access your dashboard.</p>
            </div>

            <form method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="name@example.com" required autocomplete="off">
                </div>
                <button type="submit">Sign In ➡</button>
            </form>
        </div>
    </div>

</body>

</html>
