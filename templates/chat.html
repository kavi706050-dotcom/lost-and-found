<!DOCTYPE html>
<html>

<head>
    <title>Chat Validation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00f260;
        }

        .header-info h2 {
            margin: 0;
            font-size: 1.2em;
        }

        .header-info p {
            margin: 0;
            font-size: 0.9em;
            color: #ccc;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 0.95em;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #00f260, #0575e6);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 0.7em;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }

        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            outline: none;
            transition: background 0.3s;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            padding: 0 25px;
            border-radius: 30px;
            border: none;
            background: #00f260;
            color: #1e1e2f;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .back-btn {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9em;
            margin-left: auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scrollbar */
        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="header">
            <img src="{{ url_for('static', filename='uploads/' + item.image) }}" alt="Item">
            <div class="header-info">
                <h2>{{ item.name }}</h2>
                <p>User ID: <span style="color: #00f260;">{{ item.reporter_id }}</span></p>
                <p>Status: <span style="color: #00f260;">{{ item.status }}</span></p>
            </div>
            <a href="/home" class="back-btn">Exit Chat</a>
        </div>

        <div class="messages" id="messageBox">
            {% for m in messages %}
            <div class="message {% if m.sender == user %}sent{% else %}received{% endif %}">
                <div class="text">{{ m.message }}</div>
                <div class="message-meta">{{ m.sender.split('@')[0] }} • {{ m.timestamp }}</div>
            </div>
            {% endfor %}
            {% if not messages %}
            <div style="text-align: center; color: rgba(255,255,255,0.3); margin-top: 50px;">
                No messages yet. Start verification chat!
            </div>
            {% endif %}
        </div>

        <form class="input-area" method="POST">
            <input type="text" name="message" placeholder="Type a message..." required autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        // Auto scroll to bottom
        const messageBox = document.getElementById('messageBox');
        messageBox.scrollTop = messageBox.scrollHeight;
    </script>
</body>

</html>
